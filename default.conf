# WebSocket upgrade pass-through for the Penpot location below. Maps to
# "close" when the client sent no Upgrade header, per the nginx docs
# pattern; conf.d files are included at http level so `map` is legal here.
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Did the CLIENT reach us over plaintext? (system_3 #2463)
#
# `$scheme` is useless for this: Cloudflare terminates TLS and speaks http to
# the origin, so $scheme is ALWAYS "http" here regardless of what the browser
# used. Keying an upgrade off it would redirect https requests to https for
# ever. Cloudflare sets X-Forwarded-Proto to the scheme the *client* used,
# which is the only signal at this hop that distinguishes them.
#
# The empty default is deliberate and load-bearing: a request with no
# X-Forwarded-Proto did not come through Cloudflare — container healthchecks,
# compose-internal calls, direct origin hits — and must NOT be redirected.
# Redirecting those would break liveness probes to fix a browser-facing defect.
map $http_x_forwarded_proto $client_used_plaintext {
  default 0;
  http    1;
}

server {
  listen 80 default_server;
  client_max_body_size 25m;

  # Emit RELATIVE Location headers. (system_3 #2463 — the defect this fixes.)
  #
  # nginx absolutises a relative redirect using $scheme://$host, and $scheme is
  # "http" at this hop (see the map above). So the bare `return 302` redirects
  # in this file — five of them — sent an absolute `Location: http://...` to
  # requests that had ARRIVED OVER TLS. The server was performing the
  # downgrade; the user did nothing wrong. A relative Location makes the
  # browser reuse the scheme it already had, which is correct for every one of
  # these redirects and cannot regress if a sixth is added later.
  absolute_redirect off;

  # Upgrade plaintext to TLS. Runs before any location so it covers the whole
  # vhost, including the admin prefixes and the SPA catch-all.
  #
  # The apex is spelled out rather than reflected from $host (system_3 #2558).
  # This vhost is `default_server` with no server_name, so it answers to ANY
  # Host and $host would put the client's own header in the Location — an open
  # redirect. Cloudflare constrains the Host to the zone, so nothing legitimate
  # changes: the-aspirant.com is the only proxied hostname, and the two named
  # vhosts below already redirect to this same literal.
  if ($client_used_plaintext) {
    return 301 https://the-aspirant.com$request_uri;
  }

  # Docker embedded DNS. Re-resolve upstream service names on every request so
  # nginx does not cache a stale container IP when a proxied backend (server,
  # browser) is recreated. Without this, requests return 502 until this
  # container is manually restarted. Variable proxy_pass forces the lookup.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $upstream_server server:8080;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$upstream_server;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # aspirant-browser serves the matrix and per-flow detail HTML directly
  # under /browser-flows. Gate the whole prefix on an Admin JWT via nginx
  # auth_request against aspirant-server — matrix HTML would otherwise be
  # world-readable, since aspirant-browser has no auth middleware. The
  # JSON API at /api/browser-flows is separately auth'd behind /api/.
  location /browser-flows {
    auth_request /_internal/verify-admin;
    error_page 401 403 = @browser_flows_login;
    set $upstream_browser browser:8000;
    proxy_pass http://$upstream_browser;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # Internal subrequest target — validates the caller's auth_token cookie
  # (or Authorization header) has role=Admin. 200 lets the parent request
  # proceed; 401/403 triggers the error_page → /login redirect above.
  location = /_internal/verify-admin {
    internal;
    set $upstream_verify server:8080;
    rewrite ^ /internal/verify-admin break;
    proxy_pass http://$upstream_verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
  }

  # Target `/` and not `/login`: there is no /login route. The login form is a
  # sidebar component (src/components/sidebar/Login.vue), never a page, so
  # `/login` fell through the Vue router to the `:pathMatch(.*)*` catch-all and
  # rendered NotFound. The gate refused correctly and then stranded the user on
  # a dead end (system_3 #2602, found by the operator during the #2517 walk).
  #
  # This was invisible for as long as it existed because every test of these
  # surfaces ran from an already-authenticated session; only an unauthenticated
  # visitor ever reaches the redirect.
  location @browser_flows_login {
    return 302 /;
  }

  # Penpot, mounted same-origin under the admin path (system_3 #2198,
  # operator direction: path over subdomain; the admin tile opens it in a
  # new tab). Verified on 2.16.2: relative assets + hash routing + a
  # path-bearing public URI (config.js override below + backend
  # PENPOT_PUBLIC_URI) keep every request — API, websocket, signed asset
  # URLs — inside this prefix.
  location = /admin/penpot { return 302 /admin/penpot/; }

  # The image's js/config.js is inert comments; short-circuit it to point the
  # SPA at the path-bearing public URI. Keeps the stock frontend image.
  location = /admin/penpot/js/config.js {
    auth_request /_internal/verify-admin;
    error_page 401 403 = @penpot_login;
    default_type application/javascript;
    return 200 'var penpotPublicURI = "https://the-aspirant.com/admin/penpot/";\n';
  }

  location /admin/penpot/ {
    auth_request /_internal/verify-admin;
    error_page 401 403 = @penpot_login;
    # Design asset uploads and .penpot imports exceed the apex 25m cap.
    client_max_body_size 100m;
    set $upstream_penpot penpot-frontend:8080;
    rewrite ^/admin/penpot/(.*)$ /$1 break;
    proxy_pass http://$upstream_penpot;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    # Long-lived notifications websocket: upgrade headers + a read timeout
    # comfortably above Penpot's own keepalive pings.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;
  }

  location @penpot_login {
    return 302 /;
  }

  # Histoire component workbench (system_3 #2218), same admin-gated
  # pattern as Penpot above. The image serves the app at its real
  # public path (base baked at build time), so no prefix rewriting —
  # pass the URI through as-is.
  location = /admin/histoire { return 302 /admin/histoire/; }

  location /admin/histoire/ {
    auth_request /_internal/verify-admin;
    error_page 401 403 = @penpot_login;
    set $upstream_histoire histoire:80;
    proxy_pass http://$upstream_histoire;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # 301 redirects for renamed routes. Preserve bookmarks and the Cloudflare
  # cache when a page URL changes. Add one line per rename; the Vue catch-
  # all in src/router/router.js handles unknown paths that don't match here.
  rewrite ^/trusted/pappas-armhavningar/?$ /trusted/pappas-pushups permanent;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}

# home.the-aspirant.com is the DIRECT, un-proxied hostname (system_3 #2557).
#
# It exists so SSH can reach the cell on 41922 without Cloudflare in the path,
# which means its A record points at the origin IP and any HTTP request to it
# arrives here having never touched Cloudflare's TLS. It therefore carries no
# X-Forwarded-Proto, so the upgrade added for #2463 deliberately skips it (that
# carve-out exists so container healthchecks are not redirected) — and the
# result was `http://home.the-aspirant.com/login` serving a 200 login form in
# cleartext, with Login.vue posting to a relative /api/login. A password typed
# there goes on the wire in the clear.
#
# There is no legitimate HTTP use of this hostname: it is the SSH entry point.
# So serve nothing over it — send every request to the apex over TLS.
#
# This is Host-based, so it does NOT touch the healthcheck carve-out: probes
# arrive with Host: localhost (or the container name) and continue to hit the
# default_server unredirected. Verified in the test plan.
#
# RESIDUAL, not closed here: a request to the origin IP with any other Host
# still lands on the default_server over plaintext. That is a network-boundary
# problem — the origin should not accept :80 from anything but Cloudflare — and
# it cannot be fixed in nginx, which is downstream of the connection being
# accepted. This block closes the discoverable, named path.
server {
  listen 80;
  server_name home.the-aspirant.com;

  # 301 rather than 308: these are GETs of a page, and a permanent redirect lets
  # browsers stop issuing the cleartext request at all after the first hit.
  return 301 https://the-aspirant.com$request_uri;
}

# Former Penpot vhost (system_3 #2195). Penpot moved to the same-origin
# /admin/penpot/app/ path above (#2198, operator direction) so it rides the
# apex's proven TLS/auth boundary instead of a second origin. The subdomain
# remains a plain redirect; the fragment (workspace deep links) survives the
# 302 because browsers re-apply it to the redirect target.
server {
  listen 80;
  server_name design.the-aspirant.com;

  location / {
    return 302 https://the-aspirant.com/admin/penpot/;
  }
}
server {
  listen 80;
  client_max_body_size 25m;

  location /api/ {
    proxy_pass http://server:8080/;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # aspirant-browser serves the matrix and per-flow detail HTML directly
  # under /browser-flows. The JSON API at /api/browser-flows is proxied
  # through aspirant-server (location /api/ above) for auth.
  location /browser-flows {
    proxy_pass http://browser:8000;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
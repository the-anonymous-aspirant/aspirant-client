# WebSocket upgrade pass-through for the Penpot vhost below. Maps to
# "close" when the client sent no Upgrade header, per the nginx docs
# pattern; conf.d files are included at http level so `map` is legal here.
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80 default_server;
  client_max_body_size 25m;

  # Docker embedded DNS. Re-resolve upstream service names on every request so
  # nginx does not cache a stale container IP when a proxied backend (server,
  # browser) is recreated. Without this, requests return 502 until this
  # container is manually restarted. Variable proxy_pass forces the lookup.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $upstream_server server:8080;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$upstream_server;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # aspirant-browser serves the matrix and per-flow detail HTML directly
  # under /browser-flows. Gate the whole prefix on an Admin JWT via nginx
  # auth_request against aspirant-server — matrix HTML would otherwise be
  # world-readable, since aspirant-browser has no auth middleware. The
  # JSON API at /api/browser-flows is separately auth'd behind /api/.
  location /browser-flows {
    auth_request /_internal/verify-admin;
    error_page 401 403 = @browser_flows_login;
    set $upstream_browser browser:8000;
    proxy_pass http://$upstream_browser;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # Internal subrequest target — validates the caller's auth_token cookie
  # (or Authorization header) has role=Admin. 200 lets the parent request
  # proceed; 401/403 triggers the error_page → /login redirect above.
  location = /_internal/verify-admin {
    internal;
    set $upstream_verify server:8080;
    rewrite ^ /internal/verify-admin break;
    proxy_pass http://$upstream_verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
  }

  location @browser_flows_login {
    return 302 /login;
  }

  # Same-origin status probe for the /admin/penpot view. Penpot serves no
  # CORS headers, so the SPA cannot probe design.the-aspirant.com directly;
  # this proxies the frontend's readyz behind the Admin gate instead.
  location = /penpot-status {
    auth_request /_internal/verify-admin;
    set $upstream_penpot penpot-frontend:8080;
    rewrite ^ /readyz break;
    proxy_pass http://$upstream_penpot;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
  }

  # 301 redirects for renamed routes. Preserve bookmarks and the Cloudflare
  # cache when a page URL changes. Add one line per rename; the Vue catch-
  # all in src/router/router.js handles unknown paths that don't match here.
  rewrite ^/trusted/pappas-armhavningar/?$ /trusted/pappas-pushups permanent;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}

# Penpot design service vhost (system_3 #2195). design.the-aspirant.com is
# a Cloudflare-proxied CNAME to the apex, so it lands on this same :80;
# only the Host header differs. TLS terminates at Cloudflare; auth is
# Penpot's own login (registration disabled) — see aspirant-deploy
# docs/PENPOT_ARCHITECTURE.md. Penpot requires a root-path public URI,
# which is why this is a vhost and not a subpath on the block above.
server {
  listen 80;
  server_name design.the-aspirant.com;

  # Design asset uploads and .penpot file imports exceed the apex 25m cap.
  client_max_body_size 100m;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    set $upstream_penpot penpot-frontend:8080;
    proxy_pass http://$upstream_penpot;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    # Long-lived notifications websocket: upgrade headers + a read timeout
    # comfortably above Penpot's own keepalive pings.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;
  }
}